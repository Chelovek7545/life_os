name: life_os
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0


dependencies:
  flutter:
    sdk: flutter
  rxdart: ^0.28.0

  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.0
  path: ^1.8.0
 


  cupertino_icons: ^1.0.8
  uuid: ^4.5.3
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # drift_dev: ^2.33.0
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: fonts\Inter-VariableFont_opsz,wght.ttf
    - family: JetBrainsMono
      fonts:
        - asset: fonts\JetBrainsMono-VariableFont_wght.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: fonts\SpaceGrotesk-VariableFont_wght.ttf
  
